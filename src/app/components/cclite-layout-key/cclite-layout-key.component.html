<svg:rect
  fill="transparent"
  class="stroke-white print:stroke-black"
  [attr.stroke-width]="strokeWidth()"
  [attr.x]="x()"
  [attr.y]="y()"
  [attr.width]="width()"
  [attr.height]="height()"
  rx="1"
></svg:rect>
<svg:rect
  class="fill-alnilam-500 print:fill-black"
  [attr.x]="x()"
  [attr.y]="y()"
  [attr.width]="width()"
  [attr.height]="height()"
  rx="1"
  [attr.opacity]="
    highlightKeyCombination()?.positionCodes?.includes(positionCode())
      ? highlightOpacity()
      : 0
  "
></svg:rect>
<svg:rect
  class="fill-red-500"
  [attr.x]="x()"
  [attr.y]="y()"
  [attr.width]="width()"
  [attr.height]="height()"
  rx="1"
  [attr.opacity]="
    secondaryHighlightPositions().includes(positionCode())
      ? highlightOpacity()
      : 0
  "
></svg:rect>
<svg:rect
  class="fill-white print:fill-black"
  [attr.x]="x() + width() * 0.365"
  [attr.y]="y() + height() * 0.8"
  [attr.width]="width() * 0.27"
  [attr.height]="height() * 0.055"
  [attr.rx]="height() * 0.028"
  [attr.opacity]="[30, 33].includes(positionCode()) ? 0.45 : 0"
></svg:rect>
<svg:g
  appKeyLabel
  [x]="x() + width() / 2"
  [y]="y() + height() / 2"
  [fontSize]="fontSize()"
  [highlightKeyCombination]="highlightKeyCombination()"
  [labels]="keyLabel()"
></svg:g>
